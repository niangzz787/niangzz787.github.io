<!DOCTYPE html>
<html>
    <head>
        <script>
            function listMake()
            {
                var list = ["Perfume", "Watch", "Bag", "Shoes", "Jewelry", "Phone", "Laptop", "Tablet", "Camera", "Headphones"];
                document.write("<ol>")

                for( var counter=0; counter < list.length; counter++)
                {
                    document.write("<li>" + list[counter] + "</li>")
                }

                document.write("</ol>")
            }

            listMake();
        </script>
    </head>
    <body>
    </body>
</html>
